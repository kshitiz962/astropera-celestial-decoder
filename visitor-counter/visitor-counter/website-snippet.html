<!-- ✅ Paste this snippet into your website's HTML (before </body>) -->
<!-- Replace YOUR_API_URL with your server's address e.g. http://localhost:3000 -->

<script>
  (function () {
    const API_URL = 'YOUR_API_URL'; // 🔁 Change this

    fetch(API_URL + '/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page: window.location.pathname })
    })
    .then(res => res.json())
    .then(data => {
      console.log('Visitor tracked:', data);
      // Optional: show visitor count on the page
      // document.getElementById('visitor-count').textContent = data.totalVisits;
    })
    .catch(err => console.error('Tracking failed:', err));
  })();
</script>
